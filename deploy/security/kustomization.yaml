# ABOUTME: ArgoCD sync target for The Net — cluster-scoped CRs from the security layer.
# ABOUTME: Helm installs (kyverno, falco, falcosidekick, external-secrets) ship as their own Apps.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../security/kyverno/policies/require-burritbot-labels.yaml
  - ../../security/kyverno/policies/require-burritbot-sidecar-naming.yaml
  - ../../security/kyverno/policies/restrict-burritbot-network.yaml
  - ../../security/eso/cluster-secret-store.yaml

# Note: the burritbot Falco rules previously lived as a raw .yaml under
# security/falco/rules/ — they are now folded into the Falco chart's
# customRules block (see gitops/apps/falco.yaml, Phase B5), so they do not
# need to be referenced from this kustomization.
