# ABOUTME: ArgoCD sync target for The Eyes — Grafana ExternalSecret + dashboard ConfigMaps.
# ABOUTME: Helm chart installs (prometheus, otel-collector, loki, tempo, promtail) ship as their own Applications.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../security/eso/grafana-admin-external-secret.yaml

# Note: kube-prometheus-stack, otel-collector, loki, tempo, promtail are not
# referenced here — they ship as standalone ArgoCD Applications under
# gitops/apps/ (B3, B4, B6) and are picked up by the recursive root app-of-apps.
# This wrapper is for namespace-scoped resources that complement those charts:
# ExternalSecrets, ConfigMap-wrapped Grafana dashboards (TODO Phase C),
# PodMonitor/ServiceMonitor extras (TODO Phase C).
