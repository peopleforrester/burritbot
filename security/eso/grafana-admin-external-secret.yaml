# ABOUTME: ExternalSecret syncing Grafana admin credentials from GCP Secret Manager.
# ABOUTME: Creates the grafana-admin-credentials Secret consumed by kube-prometheus-stack (B3).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  labels:
    burritbot.io/layer: the-web
    app.kubernetes.io/part-of: burritbot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: burritbot-grafana-admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: burritbot-grafana-admin
        property: admin-password
